services:
  - type: web
    name: trackhive-web
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    dockerCommand: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: trackhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: trackhive-redis
          type: keyvalue
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://trackhive-frontend.onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"

  - type: worker
    name: trackhive-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    dockerCommand: "celery -A config worker --loglevel=info --concurrency=4"
    envVars:
      - key: SECRET_KEY
        fromService:
          type: web
          name: trackhive-web
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: trackhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: trackhive-redis
          type: keyvalue
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"

  - type: worker
    name: trackhive-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    dockerCommand: "celery -A config beat --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trackhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: trackhive-redis
          type: keyvalue
          property: connectionString
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"

  - type: web
    name: trackhive-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://trackhive-web.onrender.com"
      - key: VITE_WS_URL
        value: "wss://trackhive-web.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: trackhive-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: trackhive-db
    databaseName: trackhive
    user: trackhive_user
    plan: free