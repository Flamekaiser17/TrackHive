services:
  - type: web
    name: trackhive-web
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health/
    dockerCommand: "/app/start.sh"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: DATABASE_URL
        fromDatabase:
          name: trackhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: trackhive-redis
          type: keyvalue
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://trackhive-frontend.onrender.com"

  - type: web
    name: trackhive-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /
    dockerCommand: "/app/start_celery.sh"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: DATABASE_URL
        fromDatabase:
          name: trackhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: trackhive-redis
          type: keyvalue
          property: connectionString

  - type: web
    name: trackhive-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /
    dockerCommand: "/app/start_beat.sh"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"
      - key: DATABASE_URL
        fromDatabase:
          name: trackhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: trackhive-redis
          type: keyvalue
          property: connectionString

  - type: web
    name: trackhive-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./backend/staticfiles/dist
    envVars:
      - key: VITE_API_URL
        value: "https://trackhive-web.onrender.com"
      - key: VITE_WS_URL
        value: "wss://trackhive-web.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: trackhive-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: trackhive-db
    databaseName: trackhive
    user: trackhive_user
    plan: free