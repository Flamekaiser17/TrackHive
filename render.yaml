services:
  # 1. Django Web Service (ASGI with Daphne)
  - type: web
    name: trackhive-web
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    startCommand: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             daphne -b 0.0.0.0 -p $PORT config.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: trackhive-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: trackhive-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://trackhive-frontend.onrender.com"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings"

  # 2. Celery Worker
  - type: worker
    name: trackhive-celery
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    startCommand: "celery -A config worker --loglevel=info --concurrency=4"
    envVars:
      - fromService:
          type: web
          name: trackhive-web
          property: envVar

  # 3. Celery Beat
  - type: worker
    name: trackhive-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    startCommand: "celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    envVars:
      - fromService:
          type: web
          name: trackhive-web
          property: envVar

  # 4. React Frontend (Static Site)
  - type: web
    name: trackhive-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: "https://trackhive-web.onrender.com"
      - key: VITE_WS_URL
        value: "wss://trackhive-web.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: trackhive-db
    databaseName: trackhive
    user: trackhive_user
    plan: free

redis:
  - type: keyvalue
    name: trackhive-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
